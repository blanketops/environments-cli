# Automated dependency updates. Two ecosystems: Go modules (the actual
# runtime dependency graph govulncheck scans) and GitHub Actions (the
# workflow files under .github/workflows/). PRs target develop, matching
# every other PR in this repo's branch flow — release branches cut from
# develop, not from dependency-update PRs directly.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
