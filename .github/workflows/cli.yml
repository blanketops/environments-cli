name: Build BlanketOps Environments CLI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Build BlanketOps Environments CLI (Dynamic)
        run: make build

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blanketops-environments
          path: cli/bin/blanketops-environments
          retention-days: 14

  static-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Static Build (gokrazy)
        # This uses the *fixed* Makefile rule with env CGO_ENABLED=0 GOOS=linux GOARCH=amd64
        run: cd cli && make static

      - name: Upload Static Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blanketops-environments-static
          path: cli/bin/blanketops-environments-static
          retention-days: 14
