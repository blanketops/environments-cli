name: Build BlanketOps Environments CLI
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build CLI (Dynamic)
        run: mage build

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bops-dynamic
          path: bin/bops
          retention-days: 14

  static-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Static Binaries (AMD64 & ARM64)
        run: |
          mage static
          mage staticarm64

      - name: Upload Static Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bops-static
          path: |
            bin/bops-static
            bin/bops-static-arm64
          retention-days: 14

      - name: CLI Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🏗️ Build Summary: BlanketOps CLI
          ## Status: Success
          ### Artifacts Generated
          | Architecture | Artifact Path |
          | :--- | :--- |
          | **Dynamic (Linux)** | \`bin/bops\` |
          | **Static (AMD64)** | \`bin/bops-static\` |
          | **Static (ARM64)** | \`bin/bops-static-arm64\` |

          > [!NOTE]
          > Artifacts are retained for **14 days**.
          EOF