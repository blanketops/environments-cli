name: Build BlanketOps Environments CLI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: self-hosted # Your local systemd-managed runner
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build CLI (Dynamic)
        # Using 'go run' avoids needing to install mage on the runner itself
        run: go run magefile.go build main.go

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blanketops-environments
          path: bin/blanketops-environments
          retention-days: 14

  static-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Static Binaries (AMD64 & ARM64)
        run: |
          go run magefile.go static
          go run magefile.go staticarm64

      - name: Upload Static Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blanketops-environments-static
          path: bin/blanketops-environments-static*
          retention-days: 14
