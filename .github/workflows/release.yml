name: Release
on:
    push:
        tags:
            - "v*"
permissions:
    contents: write
jobs:
    release:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout tag
          uses: actions/checkout@v7
          with:
            fetch-depth: 0

        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version-file: go.mod
            cache: true

        - name: Install mage
          run: go install github.com/magefile/mage@latest

        - name: Install git-cliff
          run: |
              GITCLIFF_VERSION="2.13.0"
              curl -L "https://github.com/orhun/git-cliff/releases/download/v${GITCLIFF_VERSION}/git-cliff-${GITCLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o git-cliff.tar.gz
              tar xzf git-cliff.tar.gz
              sudo mv "git-cliff-${GITCLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
              rm -rf git-cliff.tar.gz "git-cliff-${GITCLIFF_VERSION}"
              git-cliff --version

        # Build all three release binaries from the tagged commit.
        - name: Build binaries
          run: |
              mage build
              mage static
              mage staticarm64

        - name: Verify binaries
          run: |
              test -x bin/bops
              test -s bin/bops-static
              test -s bin/bops-static-arm64
              ./bin/bops || true   # banner+usage exits 1 by design; proves it executes

        - name: Checkout main
          run: |
              git checkout main
              git pull origin main

        - name: Generate CHANGELOG.md
          run: git-cliff --config .cliff.toml --output CHANGELOG.md

        - name: Commit changelog
          run: |
              git config user.name "github-actions"
              git config user.email "actions@github.com"
              git add CHANGELOG.md
              git commit -m "chore(release): update changelog for ${{ github.ref_name }}" || echo "No changes"
              git push origin main

        - name: Generate release notes
          run: git-cliff --config .cliff.toml --latest --output RELEASE_NOTES.md

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v3
          with:
            body_path: RELEASE_NOTES.md
            files: |
                  bin/bops
                  bin/bops-static
                  bin/bops-static-arm64
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Release Summary
          run: |
              cat >> $GITHUB_STEP_SUMMARY <<EOF
              # 📦 GitHub Release Published
              **Version:** \`${{ github.ref_name }}\`
              ## Completed
              - Built bops, bops-static, bops-static-arm64 from tag ${{ github.ref_name }}
              - Generated CHANGELOG.md using git-cliff
              - Committed changelog updates to main
              - Generated release notes
              - Published GitHub Release with binaries attached
              ## Assets
              - bops ($(du -h bin/bops | cut -f1))
              - bops-static ($(du -h bin/bops-static | cut -f1))
              - bops-static-arm64 ($(du -h bin/bops-static-arm64 | cut -f1))
              EOF