# Tag-triggered release pipeline. Builds static binaries, signs them with
# Cosign (keyless/OIDC), generates GitHub build-provenance attestations, then
# publishes a GitHub Release with the binaries and their signatures attached.
name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write    # Required for OIDC (Sigstore/Cosign)
  attestations: write # Required for GitHub Actions Attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install Tools
        run: |
          go install github.com/magefile/mage@latest
          curl -L https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz -o cliff.tar.gz
          tar -xzf cliff.tar.gz
          sudo mv git-cliff-2.4.0/git-cliff /usr/local/bin/git-cliff
          # Install Cosign
          go install github.com/sigstore/cosign/v2/cmd/cosign@latest

      - name: Build binaries
        run: |
          mage build
          mage static
          mage staticarm64

      # 1. Sign binaries with Cosign (Keyless)
      - name: Sign binaries
        run: |
          cosign sign-blob --yes --output-signature bin/bops-static.sig bin/bops-static
          cosign sign-blob --yes --output-signature bin/bops-static-arm64.sig bin/bops-static-arm64

      # 2. Attest build provenance
      - name: Generate Attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            bin/bops-static
            bin/bops-static-arm64

      # 3. Create Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            bin/bops-static
            bin/bops-static-arm64
            bin/bops-static.sig
            bin/bops-static-arm64.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Release Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🚀 Release Published: ${{ github.ref_name }}
          ## Security Summary
          - **Cosign Signatures:** Created \`.sig\` files for static binaries.
          - **Provenance:** Attestations generated and linked to GitHub.
          - **Verification:**
            - **Sig:** \`cosign verify-blob --certificate-identity-regexp ".*" --cert-oidc-issuer "https://token.actions.githubusercontent.com" --signature bin/bops-static.sig bin/bops-static\`
            - **Attest:** \`gh attest verify bin/bops-static --owner ${{ github.repository_owner }}\`
          EOF