name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write # Required for OIDC (Sigstore/Cosign)
  attestations: write # Required for GitHub Actions Attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install Tools
        run: |
          go install github.com/magefile/mage@latest
          curl -L https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz -o cliff.tar.gz
          tar -xzf cliff.tar.gz
          sudo mv git-cliff-2.4.0/git-cliff /usr/local/bin/git-cliff

      - name: Build binaries
        run: |
          mage build
          mage static
          mage staticarm64

      # --- Attestations & Signing ---
      - name: Generate Attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            bin/bops-static
            bin/bops-static-arm64

      # --- Release Process ---
      - name: Commit changelog
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${{ github.ref_name }}" || echo "No changes"
          git push origin main

      - name: Generate release notes
        run: git-cliff --config .cliff.toml --latest --output RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            bin/bops-static
            bin/bops-static-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Release Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 📦 GitHub Release Published
          - **Version:** \`${{ github.ref_name }}\`
          - **Status:** Signed & Attested
          - **Artifacts:** \`bops-static\`, \`bops-static-arm64\`
          EOF