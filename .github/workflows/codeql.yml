# CodeQL "Advanced" setup — GitHub's own template pattern (matrix +
# build-mode), not the simplified default. One language today (Go,
# autobuild), structured so adding another language later is a one-line
# matrix entry instead of a rewrite. Split out of security.yml so code
# scanning and dependency-vulnerability scanning (govulncheck) don't share
# a file just because they're both "security".
name: "CodeQL Advanced"

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches: [develop]
  schedule:
    - cron: "30 1 * * 0" # Sundays 01:30 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
